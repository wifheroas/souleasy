<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂易 體態科學</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fcfaf7; /* 淺米色底 */
            color: #4a4a4a;
            -webkit-tap-highlight-color: transparent;
        }

        /* 莫蘭迪色調定義 */
        .color-cream { background-color: #fdfbf7; }
        .color-sage { background-color: #a3b18a; } /* 豆沙綠 */
        .color-dusty-blue { background-color: #97a7b0; } /* 霧霾藍 */
        .color-clay { background-color: #bfa89e; } /* 莫蘭迪粉褐 */

        /* 車子區塊的定位與比例 */
        .car-hero-section {
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                        url('car.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 指引線動畫 */
        @keyframes drawLine {
            from { width: 0; opacity: 0; }
            to { width: var(--line-width); opacity: 1; }
        }

        /* 標籤淡入 */
        @keyframes fadeInTag {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 通用指引線樣式 */
        .pointer-line {
            position: absolute;
            height: 1px;
            background-color: #a3b18a; /* 豆沙綠線 */
            opacity: 0;
            animation: drawLine 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            transform-origin: left center;
        }

        /* 通用標籤樣式 */
        .status-tag {
            position: absolute;
            opacity: 0;
            font-weight: 300;
            color: white;
            padding: 2px 10px;
            border-radius: 99px;
            letter-spacing: 0.1em;
            display: inline-block;
            white-space: nowrap;
            animation: fadeInTag 0.5s ease-out 0.6s forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <section class="car-hero-section h-screen w-full relative pt-16 flex items-center px-6">
        
        <div class="w-full max-w-sm mx-auto relative h-[80vh]">
            
            <div class="text-center absolute top-0 w-full z-20">
                <span class="text-[#bfa89e] tracking-[0.3em] text-[10px] uppercase mb-1 block">Body Science</span>
                <h1 class="text-3xl md:text-5xl font-light mb-4 leading-tight text-[#5a5a5a]">
                    把身體比喻成一台車<br>
                    <span class="font-medium text-[#8a9a5b]">唯有平衡才能開得長遠</span>
                </h1>
                <p class="text-sm md:text-xl text-[#8e8e8e] mb-12 font-light tracking-wide leading-relaxed">
                    認識自己身體的能量分佈<br>找到您目前最需要的運動配方
                </p>
            </div>

            <div id="car-image-anchor" class="absolute w-[60%] h-[60%] top-[25%] left-[20%] z-10">
                
                <div id="status-cardio" class="absolute left-[-15%] top-[-5%]" style="--line-width: 40px;">
                    <div class="pointer-line" style="width: var(--line-width);"></div>
                    <div class="status-tag color-sage top-[-30px] left-[10px]">有氧</div>
                </div>

                <div id="status-flex" class="absolute right-[-10%] top-[-5%]" style="--line-width: 40px;">
                    <div class="pointer-line" style="width: var(--line-width);"></div>
                    <div class="status-tag color-dusty-blue top-[-30px] left-[10px]">柔軟度</div>
                </div>

                <div id="status-strength" class="absolute right-[-20%] bottom-[-10%]" style="--line-width: 50px;">
                    <div class="pointer-line" style="width: var(--line-width);"></div>
                    <div class="status-tag color-clay top-[-30px] left-[10px]">肌力</div>
                </div>

                </div>

            <div class="w-full text-center absolute bottom-10 z-20 px-6">
                <a href="#trial" class="inline-block w-full bg-[#8a9a5b] text-white py-4 rounded-full font-medium text-lg hover:bg-opacity-80 transition-all shadow-lg shadow-[#8a9a5b]/20 active:scale-95">
                    立即測驗
                </a>
                <p class="text-xs text-gray-400 mt-4 tracking-widest">約需 3 分鐘，即可獲得客製化分析</p>
            </div>

        </div>

    </section>

</body>
</html>
